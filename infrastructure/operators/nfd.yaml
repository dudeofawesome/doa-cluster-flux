---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfd-installer
  namespace: operators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nfd-installer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nfd-installer
subjects:
  - kind: ServiceAccount
    name: nfd-installer
    namespace: operators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nfd-installer
rules:
  # Install and manage the CRDs shipped in the NFD operator bundle.
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [create, list, watch]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, update, patch, delete]
    resourceNames:
      - nodefeaturediscoveries.nfd.kubernetes.io
      - nodefeaturerules.nfd.kubernetes.io
      - noderesourcetopologies.topology.node.k8s.io

  # The remaining rules mirror the permissions shipped in the 0.6.0 bundle.
  # OLM v1 needs these permissions to create the operator's RBAC resources.
  - apiGroups: ['']
    resources:
      - configmaps
      - endpoints
      - events
      - namespaces
      - nodes
      - nodes/status
      - persistentvolumeclaims
      - pods
      - secrets
      - serviceaccounts
      - services
    verbs: ['*']
  - apiGroups: [apps]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ['*']
  - apiGroups: [cert-manager.io]
    resources:
      - certificates
      - issuers
    verbs:
      - get
      - list
      - watch
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: ['*']
  - apiGroups: [nfd.kubernetes.io]
    resources: ['*']
    verbs: ['*']
  - apiGroups: [nfd.k8s-sigs.io]
    resources: [nodefeaturerules]
    verbs:
      - get
      - list
      - watch
  - apiGroups: [policy]
    resources: [podsecuritypolicies]
    resourceNames: [nfd-worker]
    verbs: [use]
  - apiGroups: [rbac.authorization.k8s.io]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ['*']
  - apiGroups: [topology.node.k8s.io]
    resources: [noderesourcetopologies]
    verbs:
      - create
      - get
      - update
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
  - nonResourceURLs: [/metrics]
    verbs: [get]
---
apiVersion: olm.operatorframework.io/v1
kind: ClusterExtension
metadata:
  name: nfd
spec:
  namespace: operators
  serviceAccount:
    name: nfd-installer
  source:
    sourceType: Catalog
    catalog:
      packageName: nfd-operator
      channels: [stable]
      # renovate: datasource=github-releases depName=kubernetes-sigs/node-feature-discovery-operator extractVersion=^v(?<version>.+)$
      version: '0.6.0'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfd-controller-manager
  namespace: operators
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      containers:
        - name: kube-rbac-proxy
          # renovate: datasource=docker depName=quay.io/brancz/kube-rbac-proxy
          image: quay.io/brancz/kube-rbac-proxy:v0.22.1@sha256:e8cad21b2f9ad0302f1ec972c555a1d916f51aae6003da3cd2554d5f29bb9bc4
