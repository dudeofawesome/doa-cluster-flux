apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfd
  namespace: node-feature-discovery
spec:
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: node-feature-discovery
      version: '0.19.0'
      sourceRef:
        kind: HelmRepository
        name: nfd
        namespace: flux-system
      interval: 12h
  values:
    image:
      # renovate: datasource=docker depName=registry.k8s.io/nfd/node-feature-discovery
      tag: v0.19.0@sha256:2fa1c99ad09bdf2c8ad97706a4ad2fd548c84d5ecd70ba32a6152c667b96c4d2
    worker:
      tolerations:
        - effect: NoSchedule
          operator: Exists
