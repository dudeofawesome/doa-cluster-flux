---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: reflector
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: reflector
      version: '10.0.38'
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
      interval: 12h
  values:
    installCRDs: true
