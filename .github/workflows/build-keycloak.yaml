name: Build Keycloak

on:
  push:
    branches: [main]
    paths:
      - images/keycloak/**
      - .github/workflows/build-keycloak.yaml
  schedule:
    # Weekly on Sundays at 04:00 UTC — picks up base image security patches
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      kc_version:
        description: 'Keycloak version override (leave empty to use Containerfile default)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keycloak

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from Containerfile
        id: version
        run: |
          if [ -n "${{ inputs.kc_version }}" ]; then
            kc_ref="${{ inputs.kc_version }}"
          else
            kc_ref=$(grep -oP '^ARG KC_VERSION=\K.*' images/keycloak/Containerfile)
          fi

          # Docker tags cannot include a digest, so publish using the version part only.
          kc_tag="${kc_ref%%@*}"

          echo "kc_ref=${kc_ref}" >> "$GITHUB_OUTPUT"
          echo "kc_tag=${kc_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: images/keycloak
          file: images/keycloak/Containerfile
          push: false
          load: true
          build-args: |
            KC_VERSION=${{ steps.version.outputs.kc_ref }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_tag }}-${{ github.run_id }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_tag }}-${{ github.run_id }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
