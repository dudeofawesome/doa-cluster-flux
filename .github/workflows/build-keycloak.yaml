name: Build Keycloak

on:
  push:
    branches: [main]
    paths:
      - images/keycloak/**
      - .github/workflows/build-keycloak.yaml
  schedule:
    # Weekly on Sundays at 04:00 UTC — picks up base image security patches
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      kc_version:
        description: 'Keycloak version override (leave empty to use Containerfile default)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keycloak

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Containerfile
        id: version
        run: |
          if [ -n "${{ inputs.kc_version }}" ]; then
            echo "kc_version=${{ inputs.kc_version }}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep -oP '^ARG KC_VERSION=\K.*' images/keycloak/Containerfile)
            echo "kc_version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: images/keycloak
          file: images/keycloak/Containerfile
          push: false
          load: true
          build-args: |
            KC_VERSION=${{ steps.version.outputs.kc_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_version }}-${{ github.run_id }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.kc_version }}-${{ github.run_id }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
