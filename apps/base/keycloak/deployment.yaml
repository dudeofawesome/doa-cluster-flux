# Reference:
# https://github.com/keycloak/keycloak/discussions/12594
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      component: app
  template:
    metadata:
      labels:
        component: app
    spec:
      containers:
        - name: 'keycloak'
          image: 'ghcr.io/dudeofawesome/keycloak:26.1'
          args: ['start', '--optimized']
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: admin
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin
                  key: password

            # https://www.keycloak.org/server/hostname
            - name: KC_PROXY_HEADERS
              value: 'xforwarded'
            - name: KC_HOSTNAME
              # hostname is actually origin…
              value: 'https://auth.orleans.io'
            # - name: 'KC_HOSTNAME_ADMIN'
            #   value: 'admin.auth.orleans.io'
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: 'true'

            # KC_HEALTH_ENABLED and KC_METRICS_ENABLED are baked into the
            # optimized image (see images/keycloak/Containerfile)
            - name: KC_HTTP_MANAGEMENT_PORT
              value: '9000'

            - name: KC_SPI_ADMIN_REALM
              value: 'master'

            # KC_DB=postgres is baked into the optimized image
            - name: KC_DB_URL_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: host
            - name: KC_DB_URL_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: port
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: dbname

            - name: KC_HTTPS_CERTIFICATE_FILE
              value: /run/secrets/tls.crt
            - name: KC_HTTPS_CERTIFICATE_KEY_FILE
              value: /run/secrets/tls.key
          volumeMounts:
            - name: https-certificate-file
              mountPath: /run/secrets/tls.crt
              subPath: tls.crt
              readOnly: true
            - name: https-certificate-key-file
              mountPath: /run/secrets/tls.key
              subPath: tls.key
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8443
            - name: health
              containerPort: 9000
          resources:
            requests:
              cpu: 10m
              memory: 400Mi
            limits:
              cpu: 1000m
              memory: 1500Mi
          startupProbe:
            timeoutSeconds: 180 # 3 minutes
            periodSeconds: 30
            httpGet:
              path: /health/ready
              port: health
              scheme: HTTPS
          readinessProbe:
            timeoutSeconds: 30
            httpGet:
              path: /health/ready
              port: health
              scheme: HTTPS
          livenessProbe:
            timeoutSeconds: 30
            httpGet:
              path: /health/live
              port: health
              scheme: HTTPS
      volumes:
        - name: https-certificate-file
          secret:
            secretName: internal-cluster-service-cert
            items:
              - key: tls.crt
                path: tls.crt
        - name: https-certificate-key-file
          secret:
            secretName: internal-cluster-service-cert
            items:
              - key: tls.key
                path: tls.key
