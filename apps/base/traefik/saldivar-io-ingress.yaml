---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: saldivar-io-https
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`saldivar.io`) || HostSNIRegexp(`^.+\.saldivar\.io$`)
      services:
        - name: saldivar-io
          port: https
  tls:
    passthrough: true
---
apiVersion: v1
kind: Service
metadata:
  name: saldivar-io
spec:
  # No selector: this service is backed by the manual Endpoints object below,
  # which forwards traffic to a host outside the cluster.
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: saldivar-io
# Endpoints must match the Service name/namespace so Kubernetes can use this
# external IP as the backend for the selector-less Service above.
subsets:
  - addresses:
      - ip: 10.0.1.6
    ports:
      - name: https
        port: 443
        protocol: TCP
