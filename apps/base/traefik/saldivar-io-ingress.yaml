---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: saldivar-io-https
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`saldivar.io`)
      services:
        - name: saldivar-io
          port: https
    - match: HostSNI(`*.saldivar.io`)
      services:
        - name: saldivar-io
          port: https
  tls:
    passthrough: true
---
apiVersion: v1
kind: Service
metadata:
  name: saldivar-io
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: saldivar-io
subsets:
  - addresses:
      - ip: 10.0.1.6
    ports:
      - name: http
        port: 80
        protocol: TCP
      - name: https
        port: 443
        protocol: TCP