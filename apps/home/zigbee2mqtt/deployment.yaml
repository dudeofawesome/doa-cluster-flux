---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      component: app
  strategy:
    # Only a single container can be running at a time because a lock is
    #   required on the Zigbee bridge.
    type: Recreate
  template:
    metadata:
      labels:
        component: app
    spec:
      containers:
        - name: zigbee2mqtt
          image: docker.io/koenkk/zigbee2mqtt:2.9.1@sha256:574b2bd0dcbb59fae6edbbb81a35b5563291d3825da0225f0078aa5575dac37f

          securityContext:
            privileged: true
            runAsGroup: 27 # dialout

          env:
            - name: TZ
              value: America/Los_Angeles
            # - name: DEBUG
            #   value: zigbee-herdsman*

            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY
              valueFrom:
                secretKeyRef:
                  name: zigbee
                  key: network_key
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID
              valueFrom:
                secretKeyRef:
                  name: zigbee
                  key: pan_id
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID
              valueFrom:
                secretKeyRef:
                  name: zigbee
                  key: ext_pan_id

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: zigbee-gateway
              mountPath: /dev/ttyUSB0
            - name: udev
              mountPath: /run/udev
              readOnly: true

          ports:
            - name: http
              containerPort: 8080

          resources:
            # limits:
            #   cpu: 250m
            #   memory: 1Gi
            # requests:
            #   cpu: 250m
            #   memory: 1Gi

          startupProbe:
            httpGet:
              port: http
              path: /
            # (12 * 10) seconds = 2 minutes
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              port: http
              path: /
            initialDelaySeconds: 0
            failureThreshold: 3
            periodSeconds: 10

      initContainers:
        # z2m requires a writable configuration.yaml
        - name: copy-configuration
          image: busybox:stable@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ['/bin/sh']
          args:
            - -c
            - cp /configuration.yaml /app/data/configuration.yaml
          volumeMounts:
            - name: configuration
              mountPath: /configuration.yaml
              subPath: configuration.yaml
            - name: data
              mountPath: /app/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: configuration
          configMap:
            name: z2m-config
            items:
              - key: configuration.yaml
                path: configuration.yaml
        - name: zigbee-gateway
          hostPath:
            path: /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_9ef13de3ab45ed119701c58f0a86e0b4-if00-port0
        - name: udev
          hostPath:
            path: /run/udev
