apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      component: app
  template:
    metadata:
      labels:
        component: app
    spec:
      initContainers:
        - name: initialize-config
          image: busybox:stable@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - cd /config && mkdir -p themes blueprints/automation/dudeofawesome && touch automations.yaml scripts.yaml scenes.yaml
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
      # securityContext:
      #   fsGroup: 33
      #   fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: home-assistant-app
          image: 'ghcr.io/home-assistant/home-assistant:2026.4.4@sha256:c1e5f0147f4cb51ccb05bb30b62a1269cc1bd48a6274792d3b38a77ab274dfd2'
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: environment
          env:
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: uri

            - name: oidc_issuer_url
              valueFrom:
                configMapKeyRef:
                  name: oidc
                  key: issuer_url
            - name: oidc_client_id
              valueFrom:
                configMapKeyRef:
                  name: oidc
                  key: client_id
            - name: oidc_client_secret
              valueFrom:
                secretKeyRef:
                  name: oidc
                  key: client_secret
          ports:
            - name: http
              containerPort: 8123
              protocol: TCP
          resources: {}
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
          volumeMounts:
            - name: ha-config-root
              mountPath: /config
            - name: ha-configuration-base
              mountPath: /config/configuration.yaml
              subPath: configuration.yaml
              readOnly: true
            - name: automation-blueprints
              mountPath: /config/blueprints/automation/dudeofawesome/switch-light-link.yaml
              subPath: switch-light-link.yaml
              readOnly: true
            - name: authentication-scripts
              mountPath: /usr/bin/auth-oidc.py
              subPath: auth-oidc.py
              readOnly: true
      restartPolicy: Always
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
        - name: ha-config-root
          persistentVolumeClaim:
            claimName: config-root
        - name: ha-configuration-base
          configMap:
            name: configuration
            items:
              - key: configuration.yaml
                path: configuration.yaml
        - name: automation-blueprints
          configMap:
            name: automation-blueprints
            items:
              - key: switch-light-link.yaml
                path: switch-light-link.yaml
        - name: authentication-scripts
          configMap:
            name: authentication-scripts
            items:
              - key: auth-oidc.py
                path: auth-oidc.py
                mode: 0555
