apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      component: app
  template:
    metadata:
      labels:
        component: app
    spec:
      containers:
        - name: esphome
          image: ghcr.io/esphome/esphome:2026.7.2@sha256:ef2e15e0007536345fddcebd5968eb32f4d949b3178627f091be8ddc0793db9f
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6052
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: config
              mountPath: /config
        - name: config-git-sync
          image: alpine/git:v2.54.0@sha256:77418e6e7c7f434c4a98eaff04ef16840cf03649c881c03948e3e213923e3136
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /usr/local/bin/git-sync.sh
          env:
            - name: GIT_REPO_DIR
              value: /config
            - name: GIT_REMOTE
              value: ssh://git@github.com/dudeofawesome/esphome-devices
            - name: GIT_BRANCH
              value: main
            - name: GIT_SYNC_INTERVAL
              value: '300'
          resources: {}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-git-sync
              mountPath: /usr/local/bin/git-sync.sh
              subPath: git-sync.sh
              readOnly: true
            - name: config-git-ssh
              mountPath: /etc/git-secret
              readOnly: true
      restartPolicy: Always
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: config
        - name: config-git-sync
          configMap:
            name: config-git-sync
            defaultMode: 0555
        - name: config-git-ssh
          secret:
            secretName: esphome-config-git
            defaultMode: 0400
