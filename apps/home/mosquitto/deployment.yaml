---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
spec:
  replicas: 1
  # This pod binds a fixed hostPort, so a second replica cannot be scheduled
  # during rollout on the single-node cluster.
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      component: app
  template:
    metadata:
      labels:
        component: app
    spec:
      containers:
        - name: mosquitto
          image: docker.io/library/eclipse-mosquitto:2.1.2-alpine@sha256:a908c65cc8e67ec9d292ef27c2c0360dbaaee7eb1b935cdd194e67697f15dea1 # updateable version
          env:
            - name: TZ
              value: 'America/Los_Angeles'
          ports:
            - name: mqtt-cleartext
              containerPort: 1883
            - name: mqtts
              containerPort: 8883
              hostPort: 8883
            - name: websocket
              containerPort: 9001
          resources:
            # limits:
            #   cpu: 250m
            #   memory: 1Gi
            # requests:
            #   cpu: 250m
            #   memory: 1Gi
          volumeMounts:
            - name: configuration
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: tls-certificate
              mountPath: /mosquitto/certs
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: mqtt-cleartext
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: mqtt-cleartext
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: mqtt-cleartext
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
      volumes:
        - name: configuration
          configMap:
            name: configuration
            items:
              - key: mosquitto.conf
                path: mosquitto.conf
        - name: tls-certificate
          secret:
            secretName: mosquitto-tls
