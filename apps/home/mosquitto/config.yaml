apiVersion: v1
kind: ConfigMap
metadata:
  name: configuration
data:
  mosquitto.conf: |

    # Internal cleartext listener for in-cluster clients.
    listener 1883

    # TLS listener exposed directly on the node for LAN clients.
    listener 8883
    certfile /mosquitto/certs/tls.crt
    keyfile /mosquitto/certs/tls.key

    # TODO: require auth
    # Disable authentication
    allow_anonymous true
